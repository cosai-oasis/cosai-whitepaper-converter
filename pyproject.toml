[tool.pytest.ini_options]
testpaths = ["tests"]
minversion = "6.0"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--showlocals",
]
markers = [
    "integration: Integration tests that test full conversion pipeline (slower, may have external dependencies)",
    "unit: Unit tests for individual functions (fast, isolated)",
    "slow: Slow tests that take significant time to run (e.g., full Docker-based conversions)",
]

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    ".venv/*",
    "venv/*",
    "*/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
