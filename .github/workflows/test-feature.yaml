name: Test Devcontainer Feature

on:
  push:
    branches:
      - main
      - feature/**
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'test/**'
      - '.github/workflows/test-feature.yaml'
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'test/**'
      - '.github/workflows/test-feature.yaml'
  workflow_call:

jobs:
  test-scenarios:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bundle scripts into feature
        run: |
          mkdir -p src/whitepaper-converter/scripts
          cp scripts/install-deps.sh src/whitepaper-converter/scripts/
          cp scripts/verify-deps.sh src/whitepaper-converter/scripts/
          cp scripts/configure-chromium.sh src/whitepaper-converter/scripts/

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test feature scenarios
        run: devcontainer features test -f whitepaper-converter --skip-autogenerated --skip-duplicated .

  test-base-image:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bundle scripts into feature
        run: |
          mkdir -p src/whitepaper-converter/scripts
          cp scripts/install-deps.sh src/whitepaper-converter/scripts/
          cp scripts/verify-deps.sh src/whitepaper-converter/scripts/
          cp scripts/configure-chromium.sh src/whitepaper-converter/scripts/

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test on Ubuntu base image
        run: devcontainer features test --skip-scenarios -f whitepaper-converter -i mcr.microsoft.com/devcontainers/base:ubuntu .

