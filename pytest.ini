[pytest]
# Pytest configuration for CoSAI Whitepaper Converter

# Test markers
markers =
    integration: Integration tests that test full conversion pipeline (slower, may have external dependencies)
    unit: Unit tests for individual functions (fast, isolated)
    slow: Slow tests that take significant time to run (e.g., full Docker-based conversions)

# Default test path
testpaths = tests

# Minimum Python version
minversion = 6.0

# Output options
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals

# Coverage options (when using --cov)
[coverage:run]
source = .
omit =
    */tests/*
    */venv/*
    */.venv/*
    */migrations/*
    */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
